<section
  aria-labelledby="text-input-panel-title"
  class="rounded-3xl border border-slate-200 bg-slate-50/70 p-4 sm:p-5"
>
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div class="space-y-1">
      <h3 id="text-input-panel-title" class="text-lg font-semibold text-slate-950">{{ label() }}</h3>
      <p [id]="descriptionId()" class="text-sm leading-6 text-slate-600">
        {{ description() }}
      </p>
    </div>

    <p class="text-sm font-medium text-slate-500" [id]="footerId()">
      {{ currentLength() }} caracteres
    </p>
  </div>

  <label class="sr-only" [for]="textareaId()">{{ label() }}</label>

  <textarea
    #textareaElement
    class="mt-4 block w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-base leading-7 text-slate-950 shadow-sm outline-none transition focus:border-cyan-500 focus:ring-4 focus:ring-cyan-100 disabled:cursor-not-allowed disabled:bg-slate-100"
    [attr.aria-describedby]="descriptionId() + ' ' + footerId()"
    [disabled]="disabled()"
    [id]="textareaId()"
    [placeholder]="placeholder()"
    [rows]="minRows()"
    [value]="value()"
    spellcheck="true"
    (input)="onInput($event)"
  ></textarea>
</section>
