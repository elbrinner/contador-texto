<section
  aria-labelledby="analysis-shell-title"
  class="grid gap-6 rounded-[2rem] border border-slate-200 bg-white p-4 shadow-sm sm:p-6 lg:grid-cols-[minmax(0,1.65fr)_minmax(18rem,1fr)] lg:gap-8 lg:p-8"
>
  <div class="space-y-4">
    <div class="space-y-2">
      <h2 id="analysis-shell-title" class="text-2xl font-semibold tracking-tight text-slate-950">
        Flujo principal
      </h2>
      <p class="max-w-2xl text-sm leading-6 text-slate-600 sm:text-base">
        La shell mantiene el límite entre entrada y presentación usando un store con Signals como punto de
        coordinación.
      </p>
    </div>

    <app-text-input-panel
      [autofocus]="true"
      [description]="'Pega contenido largo, notas o prompts para recalcular las métricas en el mismo flujo.'"
      [placeholder]="'Empieza aquí. El resumen se actualiza desde el store.'"
      [value]="sourceText()"
      (valueChange)="updateText($event)"
    />
  </div>

  <div class="space-y-4">
    <div
      class="rounded-2xl border border-cyan-100 bg-cyan-50/70 px-4 py-3 text-sm leading-6 text-cyan-900"
      role="status"
    >
      {{ statusMessage() }}
    </div>

    <app-metrics-panel
      [caption]="'Panel conectado al snapshot calculado por el store sin recalcular nada en la vista.'"
      [isPending]="isPending()"
      [metrics]="metrics()"
    />
  </div>
</section>
